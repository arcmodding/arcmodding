<!DOCTYPE html>
<html>
<head>

<title>ARC Login</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

body{

background:#090909;
color:white;
font-family:Arial;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.box{

padding:40px;

background:#141414;

border-radius:25px;

width:350px;

text-align:center;

}

input{

width:100%;

padding:14px;

margin:8px 0;

border:none;

border-radius:10px;

}

button{

width:100%;
padding:14px;

background:#00ff88;

border:none;

font-weight:bold;

cursor:pointer;

border-radius:10px;

}

</style>

</head>

<body>

<div class="box">

<h1>ARC Sign In</h1>

<input id="email" placeholder="Email">

<input id="password"
type="password"
placeholder="Password">

<button onclick="signup()">

Create Account

</button>

<br><br>

<button onclick="login()">

Sign In

</button>

</div>

<script>

const firebaseConfig={

apiKey:"PUT_KEY_HERE",
authDomain:"PUT_DOMAIN_HERE",

};

firebase.initializeApp(firebaseConfig);

function signup(){

firebase.auth()

.createUserWithEmailAndPassword(

email.value,
password.value

)

}

function login(){

firebase.auth()

.signInWithEmailAndPassword(

email.value,
password.value

)

.then(()=>{

window.location="dashboard.html"

})

}

</script>

</body>
</html>
