<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ARC Modding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

/* ========= CUSTOMIZE HERE ========= */

:root{

--main:#00ff88;
--secondary:#00aaff;
--background:#080808;

--card:rgba(255,255,255,.05);
--nav:rgba(15,15,15,.60);

--text:white;

--logo:ARC MODDING;
--radius:30px;

--glow:0 0 40px rgba(0,255,136,.25);

}

/* ========= END CUSTOMIZE ========= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
scroll-behavior:smooth;
}

body{
background:var(--background);
color:var(--text);
overflow-x:hidden;
}

.bg{

position:fixed;
inset:0;
z-index:-1;

background:
radial-gradient(circle at 15% 20%,var(--main),transparent 20%),
radial-gradient(circle at 80% 40%,var(--secondary),transparent 25%),
radial-gradient(circle at 50% 90%,var(--main),transparent 20%);

filter:blur(110px);
opacity:.35;

animation:move 12s infinite alternate;
}

@keyframes move{

from{
transform:scale(1)
}

to{
transform:scale(1.4) rotate(8deg)
}

}

nav{

position:fixed;
top:0;
width:100%;
padding:20px 8%;

display:flex;
justify-content:space-between;
align-items:center;

background:var(--nav);

backdrop-filter:blur(20px);

z-index:999;

}

.logo{

font-size:32px;
font-weight:900;
color:var(--main);

}

nav a{

color:white;
text-decoration:none;
margin-left:20px;

}

.hero{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

.box{

max-width:900px;

padding:60px;

border-radius:var(--radius);

background:var(--card);

backdrop-filter:blur(25px);

box-shadow:var(--glow);

text-align:center;

}

h1{

font-size:85px;
line-height:.9;

}

.green{

color:var(--main);

}

p{

margin-top:25px;
line-height:1.7;
opacity:.7;

}

.btn{

display:inline-block;

margin:12px;

padding:15px 35px;

border-radius:999px;

text-decoration:none;

transition:.3s;

}

.main{

background:var(--main);

color:black;

font-weight:bold;

}

.second{

border:1px solid rgba(255,255,255,.2);

color:white;

}

.btn:hover{

transform:translateY(-6px);

}

section{
padding:100px 8%;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}

.card{

padding:35px;

border-radius:var(--radius);

background:var(--card);

backdrop-filter:blur(20px);

}

footer{

padding:50px;
text-align:center;
opacity:.5;

}

</style>
</head>

<body>

<div class="bg"></div>

<nav>

<div class="logo">

ARC MODDING

</div>

<div>

<a href="#">Home</a>

<a href="#downloads">Downloads ( NOT WORKING RN )</a>

<a href="https://discord.gg/arcmoddinghub" target="_blank">
Discord
</a>

</div>

</nav>

<div class="hero">

<div class="box">

<h1>

<span class="green">GORILLA TAG</span>

<br>

MOD HUB

</h1>

<p>

ARC community mods, menus, cosmetics and projects.

</p>

<br>

<a
class="btn main"
href="downloads/ARCMenuV1.zip"
download>

DOWNLOAD

</a>

<a
class="btn second"
href="https://discord.gg/arcsmoddinghub"
target="_blank">

JOIN DISCORD

</a>

</div>

</div>

<section id="downloads">

<h1>Downloads</h1>

<br>

<div class="grid">

<div class="card">

<h2>
ARC Menu V1
</h2>

<p>

Newest release.

</p>

<br>

<a
class="btn main"
href="downloads/ARCMenuV1.zip"
download>

Download

</a>

</div>

</div>

</section>

<footer>

arcmodding.org x arc inc© 2026

</footer>

</body>
</html>
